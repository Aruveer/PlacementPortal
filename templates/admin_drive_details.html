{% extends "admin_dashboard.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 p-5 bg-white rounded-4">
                <div class="d-flex align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0">{{ drive.job }}</h2>
                        <p class="text-muted fs-5">{{ drive.company.name }}</p>
                    </div>
                </div>
                <hr>

                <div>
                    <h5 class="fw-bold">Job Description</h5>
                    <p class="text-secondary" style="line-height: 1.6;">{{ drive.description }}</p>
                </div>

                <div >
                    <div class="col-6">
                        <h6 class="fw-bold text-muted">Expected Salary</h6>
                        <p class="fs-5 text-dark">₹ {{ drive.salary or 'TBD' }}</p>
                    </div>
                    <div >
                        <h6 class="fw-bold text-muted">Location</h6>
                        <p class="fs-5 text-dark">{{ drive.location or 'Remote / Not Specified' }}</p>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a href="{{ url_for('manage_live_drives') }}" class="btn btn-outline-primary py-2 fw-bold">Go Back</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
