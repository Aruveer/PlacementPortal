{% extends "student_dashboard.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0">Edit Your Profile</h3>
                <a href="{{ url_for('student_dashboard', u_id=u_id) }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
            </div>

            <form action="{{ url_for('edit_profile', u_id=u_id) }}" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Technical Skills</label>
                    <textarea name="skills" class="form-control" rows="3" placeholder="e.g. Python, Flask, SQL, React">{{ student.skills or '' }}</textarea>
                    <div class="form-text">Separate skills with commas.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Professional Resume (PDF)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf">
                    
                    {% if student.resume %}
                    <div class="mt-2 small text-success">
                        <i class="bi bi-check-circle"></i> Current Resume: 
                        <a href="{{ url_for('static', filename='resumes/' + student.resume) }}" target="_blank" class="text-decoration-none fw-bold">
                            {{ student.resume }}
                        </a>
                    </div>
                    {% else %}
                    <div class="mt-2 small text-muted">No resume uploaded yet.</div>
                    {% endif %}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
