{% extends "company_dashboard.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center py-5">
    <div class="card shadow-sm border-0 p-5" style="max-width: 600px; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        <h2 class="fw-bold text-primary mb-4 text-center">Update Company Profile</h2>
        
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Company Name</label>
                <input type="text" name="name" class="form-control" value="{{ company.name }}" required>
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">HR Contact Person</label>
                <input type="text" name="hr_contact" class="form-control" value="{{ company.hr_contact or '' }}" placeholder="Name or Email">
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Official Website</label>
                <input type="url" name="website" class="form-control" value="{{ company.website or '' }}" placeholder="https://example.com">
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg fw-bold shadow">Save Changes</button>
                <a href="{{ url_for('company_dashboard', u_id=u_id) }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
