{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0" id="container4">
            <div class="card-body p-4" id="cont4">
                <h3 class="text-center mb-4">Create Account</h3>
                <form action="/register" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required minlength="3" maxlength="50" pattern="[A-Za-z\s]+">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required minlength="7">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Register as:</label>
                        <select name="role" class="form-select">
                            <option value="student">Student</option>
                            <option value="company">Company</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
