{% extends "admin_dashboard.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0 p-4 mb-5" style="background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);">
        <h3 class="mb-4 fw-bold text-primary mb-0">Pending Company Registrations</h3>
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Company Name</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for comp in companies %}
                <tr>
                    <td class="fw-bold">{{ comp.name }}</td>
                    <td class="text-center">
                        <a href="{{ url_for('toggle_company_approval', company_id=comp.id) }}" class="btn btn-sm btn-success px-3">Approve Company</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted py-4">No companies currently awaiting approval.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">← Back to Dashboard</a>
</div>
{% endblock %}
