{% extends "admin_dashboard.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center py-5">
    <div class="home-main" style="max-width: 600px; padding: 40px;">
        <h2 class="home-title mb-4">Edit Student Profile</h2>
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Skills</label>
                <textarea name="skills" class="form-control" rows="3">{{ student.skills or '' }}</textarea>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg fw-bold shadow">Save Changes</button>
                <a href="{{ url_for('manage_students') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
